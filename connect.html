<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect to System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .container { background: #1e293b; border-radius: 16px; padding: 28px; max-width: 400px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.4); border: 1px solid #334155; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 20px; font-weight: 700; color: #f8fafc; margin-bottom: 4px; }
        .header p { font-size: 12px; color: #94a3b8; }
        #qr-box { background: #fff; border-radius: 12px; margin: 0 auto 20px; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #qr-box img { width: 180px; height: 180px; }
        .url-box { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; text-align: center; margin-bottom: 16px; }
        .url-box a { color: #38bdf8; font-size: 14px; font-weight: 600; text-decoration: none; word-break: break-all; display: block; }
        .url-box small { color: #64748b; font-size: 10px; margin-top: 4px; display: block; }
        .networks h3 { font-size: 11px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .net-item { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px 14px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .net-item .ip { font-size: 14px; font-weight: 600; color: #38bdf8; }
        .net-item .net-name { font-size: 10px; color: #64748b; }
        .net-item .copy-btn { background: #334155; border: none; color: #f8fafc; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .net-item .copy-btn:hover { background: #475569; }
        .hint { text-align: center; font-size: 11px; color: #64748b; margin-top: 16px; line-height: 1.6; }
        .spinner { border: 3px solid #334155; border-top: 3px solid #38bdf8; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; margin: 84px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg { background: #7f1d1d; border: 1px solid #991b1b; border-radius: 8px; padding: 12px; text-align: center; font-size: 13px; color: #fca5a5; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #334155; color: #f8fafc; padding: 8px 16px; border-radius: 6px; font-size: 13px; z-index: 9999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="school-name">NET FOUNDATION CONNECT</h1>
            <p>Scan to connect</p>
        </div>
        <div style="text-align:center;margin-bottom:12px;">
            <button class="copy-btn" onclick="window.close()" style="background:#334155;border:none;color:#f8fafc;padding:6px 16px;border-radius:6px;font-size:12px;cursor:pointer;">Close Window</button>
        </div>
        <div id="qr-box" style="background:#fff;border-radius:12px;margin:0 auto 20px;width:200px;height:200px;display:flex;align-items:center;justify-content:center;overflow:hidden;">
            <div class="spinner" id="spinner"></div>
        </div>
        <div class="url-box" id="url-box" style="display:none;">
            <a id="main-url" href="">Open System</a>
            <small>Tap to open in browser</small>
        </div>
        <div id="error-box" class="error-msg" style="display:none;"></div>
        <div class="networks">
            <h3>Network Connections</h3>
            <div id="net-list"></div>
        </div>
        <div class="hint">Scan the QR code with your phone camera to open the system. Make sure your device is on the same network.</div>
    </div>

    <script>
    function toast(msg) {
        var t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(function() { t.remove(); }, 2000);
    }

    function copyUrl(url) {
        if (navigator.clipboard) {
            navigator.clipboard.writeText(url).then(function() { toast('URL copied!'); }).catch(function() { prompt('Copy this URL:', url); });
        } else {
            prompt('Copy this URL:', url);
        }
    }

    function loadQR(url) {
        var box = document.getElementById('qr-box');
        var spinner = document.getElementById('spinner');
        spinner.style.display = 'block';
        var img = document.createElement('img');
        img.src = '/api/qr?url=' + encodeURIComponent(url);
        img.style.width = '180px';
        img.style.height = '180px';
        img.onload = function() {
            spinner.style.display = 'none';
            box.innerHTML = '';
            box.appendChild(img);
        };
        img.onerror = function() {
            spinner.style.display = 'none';
            box.innerHTML = '<div style="color:#dc2626;font-size:11px;text-align:center;padding:10px;">QR failed to load</div>';
        };
    }

    function init() {
        fetch('/api/network-info').then(function(res) {
            return res.json();
        }).then(function(data) {
            var urls = data.urls || [];
            // Pick first HTTP URL (fast, no cert warnings on client devices)
            var mainUrl = '';
            for (var i = 0; i < urls.length; i++) {
                if (urls[i].indexOf('https://') === -1 && urls[i].indexOf('/connect.html') === -1) {
                    mainUrl = urls[i];
                    break;
                }
            }
            if (!mainUrl && data.ips && data.ips.length > 0) {
                mainUrl = 'http://' + data.ips[0].address + ':' + data.port;
            }
            
            if (mainUrl) {
                document.getElementById('main-url').href = mainUrl;
                document.getElementById('main-url').textContent = mainUrl;
                document.getElementById('url-box').style.display = '';
                loadQR(mainUrl);
            }
            
            if (urls.length > 0) {
                var netList = document.getElementById('net-list');
                netList.innerHTML = urls.map(function(u) {
                    var isHttps = u.indexOf('https://') > -1;
                    var isConnect = u.indexOf('/connect.html') > -1;
                    var label = isConnect ? 'Connect' : 'Open';
                    var type = isHttps ? 'Secure' : 'Standard';
                    return '<div class="net-item">' +
                        '<div><div class="ip">' + u + '</div><div class="net-name">' + type + '</div></div>' +
                        '<button class="copy-btn" onclick="copyUrl(\'' + u + '\')">Copy</button>' +
                        '</div>';
                }).join('');
            }
        }).catch(function(e) {
            document.getElementById('spinner').style.display = 'none';
            var err = document.getElementById('error-box');
            err.textContent = 'Could not load connection info. Is the server running?';
            err.style.display = '';
        });
    }

    init();
    </script>
</body>
</html>
